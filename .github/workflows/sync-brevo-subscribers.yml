name: Sync Brevo Subscribers

on:
  workflow_dispatch:
  schedule:
    - cron: "20 8 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Supabase subscribers to Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          SUPABASE_URL: https://evhvmngwtruzdsfgcmii.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-supabase-subscribers-to-brevo.mjs
