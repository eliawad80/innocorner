name: Send Test Newsletter

on:
  workflow_dispatch:
    inputs:
      brevo_list_ids:
        description: "Comma-separated Brevo list IDs. Leave empty to send a test email only."
        required: false
        default: ""
      test_emails:
        description: "Comma-separated test recipients used when no list IDs are provided."
        required: false
        default: "info@innocorner.com"

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send approved test newsletter
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_IDS: ${{ inputs.brevo_list_ids || secrets.BREVO_LIST_ID }}
          BREVO_TEST_EMAILS: ${{ inputs.test_emails }}
        run: node scripts/send-approved-test-newsletter.mjs
