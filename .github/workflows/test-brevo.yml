name: Test Brevo API

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Brevo API key
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node scripts/test-brevo.mjs
