name: List Brevo MCP Tools

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Brevo MCP tools
        env:
          BREVO_MCP_API_KEY: ${{ secrets.BREVO_MCP_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node scripts/brevo-mcp-list-tools.mjs
